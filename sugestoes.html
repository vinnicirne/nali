<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lista de Presentes - Vinicius & Izabelle</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #D4AF37; /* Premium Gold */
            --primary-dark: #AA7C11;
            --bg-dark: #0A0A0A; /* Deep Black */
            --glass: rgba(0, 0, 0, 0.2); /* Lighter for a more vibrant look */
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            flex-direction: column;
        }

        /* Video Background constrained to card */
        .card-bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            border-radius: 20px;
            overflow: hidden;
            pointer-events: none;
        }

        .card-bg-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.5));
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            width: 100%;
            background: var(--glass);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            animation: fadeInUp 0.8s ease-out forwards;
            overflow: hidden;
        }

        @media (max-width: 480px) {
            body { padding: 0; }
            .container {
                border-radius: 0; border: none; padding: 40px 20px;
                min-height: 100vh; box-shadow: none;
            }
            .card-bg-video { border-radius: 0; }
        }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .header-icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 42px;
            color: var(--primary);
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        p.description {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .pix-box {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(0, 0, 0, 0.4));
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px dashed var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .pix-box:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        .pix-box h3 {
            color: var(--primary);
            font-family: 'Cinzel', serif;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .pix-key {
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            color: #fff;
            letter-spacing: 1px;
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pix-msg {
            font-size: 12px;
            color: #aaa;
            margin-top: 12px;
            font-style: italic;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 25px;
            border-radius: 50px;
            background: transparent;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        #toast {
            visibility: hidden;
            min-width: 220px;
            background-color: var(--primary);
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px 20px;
            position: fixed;
            z-index: 1000;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        #toast.show { visibility: visible; animation: fadeinToast 0.5s, fadeoutToast 0.5s 2.5s forwards; }
        @keyframes fadeinToast { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeoutToast { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

    </style>
</head>

<body>
    <div class="container">
        <div class="card-bg-video">
            <video id="bgVideo" autoplay loop muted playsinline>
                <source src="video_bg.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="card-video-overlay"></div>
        </div>
        <div class="header-icon">🎁</div>
        <h2>Lista de Presentes</h2>
        <p class="description">
            Sua presença é o nosso maior presente! Caso deseje nos presentear, aqui está nossa chave Pix para contribuições de qualquer valor.
        </p>

        <div class="pix-box" onclick="copyPix()">
            <h3>🔑 Chave Pix</h3>
            <div class="pix-key" id="pixKey">pix@casamentovinieiza.com</div>
            <p class="pix-msg">Clique para copiar a chave</p>
        </div>

        <a href="index.html" class="btn-back">
            ⬅️ Voltar para o Convite
        </a>
    </div>

    <div id="toast">Chave Pix copiada! 📋</div>

    <script>
        function copyPix() {
            const pixKey = document.getElementById('pixKey').innerText;
            navigator.clipboard.writeText(pixKey).then(() => {
                const toast = document.getElementById('toast');
                toast.className = 'show';
                setTimeout(() => { toast.className = ''; }, 3000);
            });
        }
    </script>
</body>
</html>
