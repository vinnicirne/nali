<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mural de Assinaturas - Emilly Angell</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff9ff3;
            --primary-dark: #f368e0;
            --bg-dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; overflow-x: hidden; flex-direction: column;
        }

        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
        }

        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2) drop-shadow(0 0 5px white); }
        }

        .container {
            position: relative; z-index: 1; max-width: 450px; width: 100%;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; padding: 30px 25px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 {
            font-family: 'Dancing Script', cursive; font-size: 38px; color: var(--primary);
            margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 159, 243, 0.6);
        }

        p.description {
            font-size: 14px; color: #ccc; margin-bottom: 25px; line-height: 1.5;
        }

        .mural-container input, .mural-container textarea {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; padding: 12px; color: #fff; font-size: 14px; margin-bottom: 15px; outline: none;
        }
        .mural-container textarea { resize: vertical; min-height: 80px; }
        
        .mural-btn {
            font-size: 15px; padding: 12px; width: 100%; background: rgba(255, 159, 243, 0.2);
            border: 1px solid var(--primary); color: #fff; border-radius: 10px;
            cursor: pointer; transition: all 0.3s; font-weight: 600; margin-bottom: 25px;
        }
        .mural-btn:hover { background: var(--primary); color: #000; }
        
        .messages-list {
            margin-top: 15px; max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            text-align: left; padding-right: 5px;
        }
        .messages-list::-webkit-scrollbar { width: 5px; }
        .messages-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 5px; }
        
        .message-card {
            background: rgba(255, 159, 243, 0.1); padding: 15px; border-radius: 15px;
            border-left: 4px solid var(--primary); animation: fadeInText 0.5s ease-out;
        }
        @keyframes fadeInText { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .message-card strong { display: block; color: var(--primary); font-size: 15px; margin-bottom: 4px; }
        .message-card span { font-size: 14px; color: #eee; line-height: 1.4; display: block; }
        .message-card small { font-size: 10px; color: #888; display: block; margin-top: 5px; text-align: right; }

        .btn-back {
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 25px; border-radius: 50px;
            background: transparent; color: #fff; text-decoration: none; font-weight: 600; font-size: 14px;
            border: 1px solid rgba(255,255,255,0.3); transition: all 0.3s ease; margin-top: 25px;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); color: var(--primary); }

        #toast {
            visibility: hidden; min-width: 220px; background-color: var(--primary); color: #1e1e2f;
            text-align: center; border-radius: 50px; padding: 12px 20px; position: fixed; z-index: 1000;
            bottom: 30px; left: 50%; transform: translateX(-50%); font-weight: 700; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #toast.show { visibility: visible; animation: fadeinToast 0.5s, fadeoutToast 0.5s 2.5s forwards; }
        @keyframes fadeinToast { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeoutToast { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>

<body>
    <div class="stars-container" id="stars"></div>

    <div class="container">
        <h2 style="font-size: 45px;">✍️</h2>
        <h2>Mural de Mensagens</h2>
        <p class="description">
            Deixe um recadinho! Ele ficará salvo no nosso mural secreto.
        </p>

        <div class="mural-container">
            <input type="text" id="guestName" placeholder="Seu nome ou apelido" />
            <textarea id="guestMessage" placeholder="Escreva sua mensagem de carinho aqui..."></textarea>
            <button class="mural-btn" onclick="addMessage()">Enviar Mensagem 💌</button>
        </div>

        <div id="messagesList" class="messages-list">
            <!-- Mensagens aparecem aqui -->
        </div>

        <a href="index.html#convite" class="btn-back">
            ⬅️ Voltar para o Convite
        </a>
    </div>

    <div id="toast">Mensagem enviada com sucesso! 💖</div>

    <script>
        // Estrelas
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        // [DASHBOARD] Mural de Mensagens LocalStorage
        function loadMessages() {
            const list = document.getElementById('messagesList');
            const messages = JSON.parse(localStorage.getItem('emilly_messages') || '[]');
            list.innerHTML = '';
            
            if(messages.length === 0) {
                list.innerHTML = '<p style="color:#888; font-size:13px; text-align:center;">Nenhuma mensagem ainda. Seja o primeiro!</p>';
            }

            messages.forEach(msg => {
                const dataFormatada = msg.date || new Date().toLocaleDateString('pt-BR');
                list.innerHTML += `
                    <div class="message-card">
                        <strong>${msg.name}</strong>
                        <span>${msg.text}</span>
                        <small>${dataFormatada}</small>
                    </div>`;
            });
        }

        function addMessage() {
            const name = document.getElementById('guestName').value;
            const text = document.getElementById('guestMessage').value;
            if(!name || !text) return;

            const messages = JSON.parse(localStorage.getItem('emilly_messages') || '[]');
            const dateStr = new Date().toLocaleDateString('pt-BR');
            messages.unshift({ name, text, date: dateStr });
            localStorage.setItem('emilly_messages', JSON.stringify(messages));
            
            document.getElementById('guestName').value = '';
            document.getElementById('guestMessage').value = '';
            loadMessages();
            
            const toast = document.getElementById('toast');
            toast.className = 'show';
            setTimeout(() => { toast.className = ''; }, 3000);
        }

        window.onload = function() {
            loadMessages();
        };
    </script>
</body>
</html>
